<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3489099294423475" crossorigin="anonymous"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickFile PDF - Developed by Prince Kashyap</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#0b3d91] via-[#0a2e6b] to-[#051937] text-white selection:bg-white/20 pb-20">

    <div class="max-w-2xl mx-auto px-6 py-8">
        
        <div class="flex justify-end mb-4">
            <button onclick="toggleSettings()" class="p-3 bg-white/10 rounded-2xl border border-white/10 hover:bg-white/20 transition-all">
                <i data-lucide="settings" class="w-6 h-6"></i>
            </button>
        </div>

        <header class="text-center mb-12">
            <div class="inline-flex items-center justify-center p-3 bg-white/10 rounded-3xl mb-4 border border-white/20 shadow-2xl">
                <img src="logo.png" alt="Logo" style="width: 80px; height: 80px; border-radius: 15px;">
            </div>
            <h1 id="mainTitle" class="text-4xl font-bold tracking-tight mb-2">QuickFile PDF</h1>
            <p id="subTitle" class="text-white/60 text-lg">Create, convert, and craft your documents</p>
        </header>

        <div class="space-y-8">
            <section class="glass rounded-3xl p-6 shadow-xl">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2 bg-white/10 rounded-lg"><i data-lucide="type" class="w-5 h-5"></i></div>
                    <h2 id="textTitle" class="text-xl font-semibold">Text to PDF</h2>
                </div>
                <textarea id="textInput" class="w-full h-48 bg-white/5 border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:ring-2 focus:ring-white/20 transition-all" placeholder="Paste or write your text here..."></textarea>
                <button onclick="downloadTextPdf()" class="w-full mt-4 py-4 rounded-xl font-bold bg-white text-[#0b3d91] hover:bg-white/90 transition-all active:scale-95">
                    Download PDF
                </button>
            </section>

            <section class="glass rounded-3xl p-6 shadow-xl">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2 bg-white/10 rounded-lg"><i data-lucide="image" class="w-5 h-5"></i></div>
                    <h2 id="imageTitle" class="text-xl font-semibold">Image to PDF</h2>
                </div>
                <div onclick="document.getElementById('imageInput').click()" class="w-full h-32 border-2 border-dashed border-white/20 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:bg-white/5 transition-all">
                    <span id="uploadText" class="text-sm font-medium text-white/60">Click to upload image</span>
                    <input type="file" id="imageInput" class="hidden" accept="image/*" multiple onchange="handleImg()">
                </div>
                <button onclick="downloadImagePdf()" class="w-full mt-4 py-4 rounded-xl font-bold bg-white text-[#0b3d91] hover:bg-white/90 transition-all">
                    Convert Image to PDF
                </button>
            </section>
        </div>

        <footer class="mt-16 text-center text-white/30 text-sm space-y-6">
            <div class="flex justify-center gap-6 text-emerald-400 font-semibold">
                <a href="#">Privacy Policy</a>
                <a href="mailto:princebhardwaj9588@gmail.com">Contact Us</a>
            </div>
            <p>Developed by <strong>Prince Kashyap</strong></p>
        </footer>
    </div>

    <div style="position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(11, 61, 145, 0.9); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); z-index: 200; height: 60px; display: flex; align-items: center; justify-content: center;">
        <div style="color: rgba(255,255,255,0.4); font-size: 10px; position: absolute; top: -18px; left: 10px; background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 5px 5px 0 0;">ADVERTISEMENT</div>
        <div id="ad-content" class="text-white/20 italic text-xs">Sticky Ad Space for Prince Kashyap</div>
    </div>

    <div id="settingsModal" class="fixed inset-0 z-[300] hidden items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-[#112240] w-full max-w-xs rounded-3xl p-6 border border-white/10 shadow-2xl">
            <h3 class="text-xl font-bold mb-6">Settings</h3>
            <div class="space-y-4">
                <button onclick="changeLang('en')" class="w-full py-3 bg-white/5 rounded-xl hover:bg-white/10 px-4 flex justify-between">English 🇺🇸</button>
                <button onclick="changeLang('hi')" class="w-full py-3 bg-white/5 rounded-xl hover:bg-white/10 px-4 flex justify-between">हिंदी 🇮🇳</button>
            </div>
            <button onclick="toggleSettings()" class="w-full mt-8 text-white/40 text-sm">Close / बंद करें</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        function toggleSettings() {
            const m = document.getElementById('settingsModal');
            m.classList.toggle('hidden');
            m.style.display = m.classList.contains('hidden') ? 'none' : 'flex';
        }

        function changeLang(l) {
            if(l === 'hi') {
                document.getElementById('mainTitle').innerText = "क्विक-फ़ाइल PDF";
                document.getElementById('subTitle').innerText = "दस्तावेज़ बनाएं और बदलें";
                document.getElementById('textTitle').innerText = "टेक्स्ट से PDF";
                document.getElementById('imageTitle').innerText = "फोटो से PDF";
                document.getElementById('textInput').placeholder = "अपना टेक्स्ट यहाँ लिखें...";
            } else { location.reload(); }
            toggleSettings();
        }

        function downloadTextPdf() {
            const txt = document.getElementById('textInput').value;
            if(!txt.trim()) return;
            const doc = new jspdf.jsPDF();
            doc.text(txt, 10, 10);
            doc.save('QuickFile.pdf');
        }

        function handleImg() {
            const f = document.getElementById('imageInput').files;
            document.getElementById('uploadText').innerText = `${f.length} Photos Selected`;
        }
    </script>
</body>
</html>
